<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AlertLBC — Connexion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f12;
      --surface: #141619;
      --border: #2a2d35;
      --accent: #e8ff47;
      --text: #e8eaed;
      --muted: #6b7280;
      --danger: #ff4444;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      /* Grid de fond */
      background-image:
        linear-gradient(rgba(232,255,71,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,255,71,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .login-wrap {
      width: 100%;
      max-width: 380px;
      padding: 24px;
    }

    .logo {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo h1 {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -1px;
    }

    .logo h1 span { color: var(--accent); }

    .logo p {
      color: var(--muted);
      font-size: 13px;
      margin-top: 6px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
    }

    .flash-error {
      background: rgba(255, 68, 68, 0.1);
      border: 1px solid rgba(255, 68, 68, 0.3);
      color: #ff7070;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: #0d0f12;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 15px;
      letter-spacing: 2px;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-group input:focus { border-color: var(--accent); }
    .form-group input::placeholder { color: var(--muted); letter-spacing: 0; }

    .hint {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
    }

    .btn {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #0d0f12;
      border: none;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover { background: #d4eb2e; }

    .footer-note {
      text-align: center;
      margin-top: 24px;
      font-size: 11px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="logo">
      <h1>Alert<span>LBC</span></h1>
      <p>Surveillance d'annonces immobilières</p>
    </div>
    <div class="card">
      {% if error %}
      <div class="flash-error">{{ error }}</div>
      {% endif %}
      <form action="/login" method="post">
        <div class="form-group">
          <label>Numéro de téléphone</label>
          <input
            type="tel"
            name="phone"
            placeholder="06 12 34 56 78"
            autocomplete="tel"
            autofocus
          >
          <p class="hint">Format : 06XXXXXXXX ou +336XXXXXXXX</p>
        </div>
        <button type="submit" class="btn">ACCÉDER →</button>
      </form>
    </div>
    <p class="footer-note">Accès privé — usage personnel uniquement</p>
  </div>
</body>
</html>
