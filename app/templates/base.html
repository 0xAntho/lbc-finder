<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}AlertLBC{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f12;
      --surface: #141619;
      --surface2: #1c1f24;
      --border: #2a2d35;
      --accent: #e8ff47;
      --accent2: #ff6b35;
      --text: #e8eaed;
      --muted: #6b7280;
      --danger: #ff4444;
      --success: #4caf7d;
      --radius: 8px;
      --font-display: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-display);
      font-size: 14px;
      line-height: 1.6;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .layout {
      display: grid;
      grid-template-columns: 220px 1fr;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 32px 0;
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      height: 100vh;
    }

    .sidebar-logo {
      padding: 0 24px 32px;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sidebar-logo span {
      color: var(--accent);
    }

    .sidebar-logo .dot {
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .sidebar-nav {
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 24px;
      color: var(--muted);
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.3px;
      transition: all 0.15s;
      border-left: 2px solid transparent;
      text-decoration: none;
    }

    .nav-item:hover { color: var(--text); text-decoration: none; }
    .nav-item.active {
      color: var(--accent);
      border-left-color: var(--accent);
      background: rgba(232, 255, 71, 0.05);
    }

    .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }

    .sidebar-footer {
      padding: 24px;
      border-top: 1px solid var(--border);
    }

    .logout-btn {
      width: 100%;
      padding: 8px 12px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      font-family: var(--font-display);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.5px;
    }
    .logout-btn:hover { border-color: var(--danger); color: var(--danger); }

    /* Main */
    .main {
      padding: 40px;
      max-width: 900px;
    }

    .page-header {
      margin-bottom: 32px;
    }

    .page-header h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1.2;
    }

    .page-header p {
      color: var(--muted);
      margin-top: 6px;
      font-size: 13px;
    }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
    }

    /* Badges */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      font-family: var(--font-mono);
      letter-spacing: 0.5px;
    }
    .badge-active { background: rgba(76, 175, 125, 0.15); color: var(--success); }
    .badge-inactive { background: rgba(107, 114, 128, 0.15); color: var(--muted); }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: var(--radius);
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      letter-spacing: 0.3px;
      text-decoration: none;
    }
    .btn-primary {
      background: var(--accent);
      color: #0d0f12;
    }
    .btn-primary:hover { background: #d4eb2e; text-decoration: none; color: #0d0f12; }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .btn-ghost:hover { border-color: var(--text); color: var(--text); text-decoration: none; }

    .btn-danger {
      background: transparent;
      border: 1px solid transparent;
      color: var(--muted);
    }
    .btn-danger:hover { color: var(--danger); }

    /* Forms */
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 10px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      transition: border-color 0.15s;
      outline: none;
    }
    .form-group input:focus, .form-group select:focus {
      border-color: var(--accent);
    }
    .form-group input::placeholder { color: var(--muted); }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    /* Flash messages */
    .flash {
      padding: 12px 16px;
      border-radius: var(--radius);
      margin-bottom: 24px;
      font-size: 13px;
      font-weight: 600;
    }
    .flash-error { background: rgba(255, 68, 68, 0.1); border: 1px solid rgba(255, 68, 68, 0.3); color: #ff7070; }
    .flash-success { background: rgba(76, 175, 125, 0.1); border: 1px solid rgba(76, 175, 125, 0.3); color: var(--success); }

    /* Mono text */
    .mono { font-family: var(--font-mono); }

    /* Divider */
    .divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 60px 24px;
      color: var(--muted);
    }
    .empty svg { width: 40px; height: 40px; margin-bottom: 16px; opacity: 0.3; }
    .empty h3 { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .empty p { font-size: 13px; }
  </style>
</head>
<body>
{% block body %}
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="dot"></div>
      Alert<span>LBC</span>
    </div>
    <nav class="sidebar-nav">
      <a href="/dashboard" class="nav-item {% if active == 'dashboard' %}active{% endif %}">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
        Alertes
      </a>
      <a href="/history" class="nav-item {% if active == 'history' %}active{% endif %}">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        Historique
      </a>
    </nav>
    <div class="sidebar-footer">
      <form action="/logout" method="post">
        <button type="submit" class="logout-btn">DÉCONNEXION</button>
      </form>
    </div>
  </aside>
  <main class="main">
    {% block content %}{% endblock %}
  </main>
</div>
{% endblock %}
</body>
</html>
